    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Quanto cobro?",
      "url": "https://quanto-cobro.vercel.app/",
      "description": "Calculadora gratuita que mostra quanto você precisa cobrar por hora como freelancer ou autônomo, considerando férias, impostos e horas realmente produtivas.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "inLanguage": "pt-BR",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL" }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Como calcular o valor da minha hora como freelancer?",
          "acceptedAnswer": { "@type": "Answer", "text": "Some o salário líquido que você quer receber, seus custos fixos mensais (internet, software, equipamento) e os impostos do seu regime. Depois divida pelo número de horas realmente produtivas no mês — descontando férias e dias de folga. É exatamente essa conta que a calculadora faz por você em menos de 1 minuto." }
        },
        {
          "@type": "Question",
          "name": "Por que férias e folgas entram no cálculo?",
          "acceptedAnswer": { "@type": "Answer", "text": "Freelancer não tem férias remuneradas: quem paga suas semanas de descanso é você. Se você tira 4 semanas por ano, seu faturamento precisa ser gerado em 48 semanas — então cada hora trabalhada tem que valer mais para cobrir o período sem trabalhar." }
        },
        {
          "@type": "Question",
          "name": "O que são \"horas produtivas\"?",
          "acceptedAnswer": { "@type": "Answer", "text": "São as horas que você efetivamente fatura. Um dia de 8 horas raramente tem 8 horas cobráveis: reuniões, propostas, e-mails e administração consomem boa parte. A maioria dos freelancers tem entre 4 e 6 horas produtivas por dia — por isso o padrão da calculadora é 5." }
        },
        {
          "@type": "Question",
          "name": "Quais impostos devo considerar: MEI, Simples Nacional ou informal?",
          "acceptedAnswer": { "@type": "Answer", "text": "MEI paga um valor fixo mensal (o DAS, cerca de R$ 86 em 2026), com teto de faturamento de R$ 81 mil por ano. No Simples Nacional você paga um percentual sobre o faturamento (a partir de ~6%). Trabalhando informalmente, sem CNPJ, estimamos ~11% para INSS e imposto de renda. A calculadora suporta os três regimes." }
        },
        {
          "@type": "Question",
          "name": "Por que cobrar com margem em vez do valor exato?",
          "acceptedAnswer": { "@type": "Answer", "text": "O valor exato cobre apenas o cenário perfeito: sem imprevistos, sem inadimplência, sem semanas fracas. Uma margem de segurança de 15% dá espaço para negociar desconto sem sair no prejuízo e absorve meses mais devagar." }
        },
        {
          "@type": "Question",
          "name": "A calculadora é gratuita?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sim, 100% gratuita e sem cadastro. Você preenche 4 passos e vê na hora quanto precisa cobrar por hora e por dia. O resultado gera um link que você pode salvar ou compartilhar." }
        }
      ]
    }
    </script>
